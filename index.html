<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淡新檔案檢索</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preload" href="./fonts/tanHsinFont_FD.ttf" as="font" crossorigin="anonymous" />
    <link rel="preload" href="./fonts/tanHsinFont_FD.woff2" as="font" crossorigin="anonymous" />
    <link rel="preload" href="./fonts/writesTaiWeb_FD.ttf" as="font" crossorigin="anonymous" />
    <link rel="preload" href="./fonts/writesTaiWeb_FD.woff2" as="font" crossorigin="anonymous" />
</head>

<body>
    <!-- 內容 -->
    <div id="content">
        <!-- 切換按鈕 -->
        <button id="tableBtn">總表</button>
        <button id="contentsBtn">簡明目錄</button>
        <!-- 切換字型 -->
        <select id="fontSelect">
            <option value='tanHsinFont_FD'>淡新字型</option>
            <!-- <option value='writesTaiWeb_FD'>方言字型</option> -->
            <!-- 新增字體要補ttf和woff2檔 -->
            <option value='BiauKaiTC'>標楷體</option>
            <option value='凌慧體-繁'>凌慧體</option>
            <option value='TW-Kai'>全字庫正楷體</option>
            <option value='font_851tegakizatsu'>851手寫體</option>
        </select>
        <!-- 門 -->
        <select id="doorSelect"></select>
        <!-- 類 -->
        <select id="cateSelect"></select>
        <!-- 款 -->
        <select id="secSelect"></select>
        <!-- 檢索表格 -->
        <table id="excelDataTable"></table>
    </div>
    <div id="downloadZone"></div>

    <script src="./js/myList.js"></script>
    <script src="./js/contents.js"></script>
    <script src="./js/fileName.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/selector.js"></script>
</body>


</html>

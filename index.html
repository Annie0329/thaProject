<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淡新檔案檢索</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preload" href="./fonts/tanHsinFont_FD.ttf" as="font" crossorigin="anonymous" />
    <link rel="preload" href="./fonts/tanHsinFont_FD.woff2" as="font" crossorigin="anonymous" />
    <link rel="preload" href="./fonts/TW-Kai-98_1.ttf" as="font" crossorigin="anonymous" />
</head>

<body>
    <!-- 內容 -->
    <div id="content">
        <!-- 切換字型 -->
        <select id="fontSelect">
            <option value='tanHsinFont_FD'>淡新字型</option>
            <!-- <option value='writesTaiWeb_FD'>方言字型</option> -->
            <option value='TW-Kai'>全字庫正楷體</option>
        </select>
        <!-- 切換按鈕 -->
        <button id="tableBtn">總表</button>
        <button id="contentsBtn">簡明目錄</button>
        <!-- 門 -->
        <select id="doorSelect"></select>
        <!-- 類 -->
        <select id="cateSelect"></select>
        <!-- 款 -->
        <select id="secSelect"></select>
        <!-- 檢索表格 -->
        <table id="excelDataTable"></table>
    </div>
    <div id="downloadZone"></div>

    <script src="./js/var_myList.js"></script>
    <script src="./js/var_contents.js"></script>
    <script src="./js/var_fileName.js"></script>
    <script src="./js/script_builder.js"></script>
    <script src="./js/script_selector.js"></script>
</body>


</html>
